<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,255,136,0.18)"/>
      <stop offset="70%" stop-color="rgba(0,255,136,0)"/>
    </radialGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0E14"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1010" cy="315" r="320" fill="url(#glow)"/>

  <!-- Right side: dartboard (smaller, pushed right) -->
  <g transform="translate(1010, 315)">
    <circle cx="0" cy="0" r="200" fill="#161B22" stroke="#00FF88" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="180" fill="#00FF88" opacity="0.05"/>
    <circle cx="0" cy="0" r="150" fill="none" stroke="#00FF88" stroke-width="3"/>
    <circle cx="0" cy="0" r="50" fill="#FF3B47"/>
    <circle cx="0" cy="0" r="20" fill="#0A0E14"/>
    <g stroke="rgba(0,255,136,0.25)" stroke-width="1.5">
      <line x1="-180" y1="0" x2="180" y2="0"/>
      <line x1="0" y1="-180" x2="0" y2="180"/>
      <line x1="-127" y1="-127" x2="127" y2="127"/>
      <line x1="-127" y1="127" x2="127" y2="-127"/>
    </g>
    <!-- "180" badge -->
    <g transform="translate(115, -165)">
      <rect x="-38" y="-22" width="76" height="44" rx="6" fill="#00FF88"/>
      <text x="0" y="10" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-size="32" font-weight="900" fill="#0A0E14" text-anchor="middle">180</text>
    </g>
  </g>

  <!-- Left side: text content -->
  <g transform="translate(70, 130)">
    <!-- Eyebrow -->
    <text x="0" y="0" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="900" fill="#00FF88" letter-spacing="7">
      UN DESARROLLO A MEDIDA
    </text>

    <!-- Main title -->
    <text x="0" y="110" font-family="'Bebas Neue', 'Oswald', 'Arial Black', Impact, sans-serif" font-size="108" font-weight="900" fill="#FFFFFF" letter-spacing="-1">
      180° COUNT-UP
    </text>

    <!-- Subtitle -->
    <text x="0" y="178" font-family="'Bebas Neue', 'Oswald', 'Arial Black', Impact, sans-serif" font-size="52" font-weight="700" fill="#00FF88" letter-spacing="1" filter="url(#neon)">
      MARCADOR DE DARDOS
    </text>

    <!-- Description -->
    <text x="0" y="245" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#8B95A1" font-weight="400">
      2-12 jugadores · undo infinito · PWA instalable
    </text>
    <text x="0" y="278" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#8B95A1" font-weight="400">
      Atajos de teclado · sin instalación · gratis
    </text>

    <!-- TomConsultor brand -->
    <g transform="translate(0, 380)">
      <text x="0" y="0" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#5A6470" letter-spacing="5">
        DESARROLLADO POR
      </text>
      <text x="0" y="44" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="900" fill="#FFFFFF">
        Tom<tspan fill="#FF8A50">Consultor</tspan>
      </text>
      <text x="0" y="74" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" fill="#5A6470">
        tomconsultor.cl
      </text>
    </g>
  </g>

  <!-- Bottom URL pill -->
  <g transform="translate(70, 590)">
    <text x="0" y="0" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="18" fill="#00FF88" letter-spacing="2" font-weight="700">
      → dardos.smx.cl
    </text>
  </g>
</svg>
